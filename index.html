<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Love 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!--Audio -->
  <audio id="bgMusic" loop>
  <source src="WeddingNasheed.mp3" type="audio/mpeg">
</audio>


<!--Love -->
<div id="hearts"></div>
<!-- MENU AWAL -->
<div id="menuAwal" class="container">
  <h1 class="nama-user"> Bismillah, Annisa Muntama <span>!</span></h1>
  <img src="giff.png" class="gift-img">
  <button onclick="; openGift()">YES! PLEASE💝</button>
  <button onclick="; noThanks()">NO🫥 THANK</button>
  <div class="logi">
  <img src="logi.png" class="logi-img">
  </div>
</div>

<!-- MENU GIFT -->
<div id="menuGift" class="container hidden">
  <h2>THESE ARE FOR YOU!</h2>
  
  <div class="card-grid">
    <div class="card" onclick="showMenu('menuPhoto')">
      <img src="photo.png" alt="Photo">
      <span>PHOTO</span>
    </div>

    <div class="card" onclick="showMenu('menuFlower')">
      <img src="flower.png" alt="Flower">
      <span>FLOWER</span>
    </div>

    <div class="card" onclick="showMenu('menuLove')">
      <img src="Love.png" alt="Love">
      <span>LOVE</span>
    </div>

    <div class="card" onclick="showMenu('menuLetter')">
      <img src="Letter.png" alt="Letter">
      <span>LETTER</span>
    </div>
  </div>

  <button class="btn-back-main" onclick="backToHome()">Back</button>
</div>

<!-- MENU PHOTO -->
<div id="menuPhoto" class="container hidden">
  <h2>📸 Photo</h2>
  <p>A Moment to Remember</p>
  <div class="photogrid">
  <img src="photo.jpeg">
  <img src="photogrid2.png">
  </div>
  <button onclick="backToGift()">Back</button>
</div>

<!-- MENU FLOWER -->
<div id="menuFlower" class="container hidden">
  <h2>🌸 Wedding</h2>
  <div class="flower">
  <img src="Wedding.png">
  </div>
  <button onclick="backToGift()">Back</button>
</div>

<!-- MENU LOVE -->
<div id="menuLove" class="container hidden">
  <h2 class="love-title">💖 Love</h2>

  <!-- Visual Love -->
  <div class="love-video">
    <img src="heart.png" class="love-bg">
    <div id="loveText">💌 Dengarkan dengan hati 💌</div>
  </div>

  <!-- Control -->
  <div class="love-control">
    <button onclick="playMusic()">▶ Play</button>
    <button onclick="pauseMusic()">⏸ Pause</button>
  </div>

  <button onclick="backToGift()">Back</button>
</div>

<!-- MENU LETTER -->
<div id="menuLetter" class="container hidden">
  <h2>💌 Letter</h2>
  <div class="dairy">
  <img src="kata1.jpeg">
  <img src="kata2.jpeg">
  <img src="kata3.jpeg">
  </div>
  <button onclick="backToGift()">Back</button>
</div>

<script src="script.js"></script>
</body>
</html>
